<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&C Coach Auto-Carousel v8.1 (Clean Edition)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3d5a4b', secondary: '#c59d5f', bglight: '#fdfbf7' },
                    fontFamily: { serif: ['"Noto Serif TC"', 'serif'], sans: ['"Noto Sans TC"', 'sans-serif'] }
                }
            }
        }
        // 系統解鎖密碼
        const ACCESS_PASSWORD = "7788999"; 
    </script>
    <style>
        /* 核心排版與重整後的簡潔 CSS */
        body { background-color: #e2e8f0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; font-family: 'Noto Sans TC', sans-serif; }
        #poster-card { width: 720px; min-height: 900px; background-color: #fdfbf7; position: relative; flex-shrink: 0; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.2); }
        .point-row { display: flex; align-items: flex-start; gap: 1.5rem; }
        .number-box { flex-shrink: 0; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background-color: #3d5a4b; color: #fdfbf7; font-weight: 800; line-height: 1; margin-top: 4px; }
        
        /* 手機版縮放適應 */
        @media (max-width: 768px) { 
            #poster-card { transform: scale(0.5); transform-origin: top center; margin-bottom: -450px; } 
            .editor-container { width: 95% !important; } 
        }
        
        /* 全螢幕安全鎖遮罩 */
        #auth-overlay { position: fixed; inset: 0; background: #3d5a4b; z-index: 99999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="text-center p-8 bg-white/10 backdrop-blur-2xl rounded-[3rem] border border-white/20 shadow-2xl w-[90%] max-w-[420px]">
            <div class="mb-4 text-secondary flex justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h2 class="text-2xl font-black mb-1 font-serif text-white tracking-widest uppercase italic">Coach's Vault</h2>
            <p class="text-white/50 text-[10px] mb-6 tracking-[0.4em] uppercase">Clean Edition v8.1</p>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="text-white/70 text-[10px] uppercase tracking-widest mb-1 block text-left pl-2">API Key (自動存於本機)</label>
                    <input id="api-key-input" type="password" class="w-full p-4 rounded-xl bg-white/90 text-primary outline-none font-mono text-xs shadow-inner" placeholder="AIzaSy...">
                </div>
                <div>
                    <label class="text-white/70 text-[10px] uppercase tracking-widest mb-1 block text-left pl-2">AI 引擎選擇</label>
                    <select id="curated-model-select" class="w-full p-3 rounded-xl bg-white text-primary outline-none text-sm font-bold shadow-sm cursor-pointer" onchange="saveModelPref()">
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash (極速/最穩/預設先發)</option>
                        <option value="gemini-1.5-flash-8b">Gemini 1.5 Flash-8B (輕量/處理短文用)</option>
                        <option value="gemini-1.5-pro">Gemini 1.5 Pro (高智商/處理艱澀長文)</option>
                        <option value="gemini-2.0-flash">Gemini 2.0 Flash (最新世代)</option>
                    </select>
                </div>
                <div>
                    <label class="text-white/70 text-[10px] uppercase tracking-widest mb-1 block text-left pl-2">System Password</label>
                    <input id="auth-input" type="password" onkeydown="if(event.key==='Enter') checkAuth()" class="w-full p-4 rounded-xl bg-white text-primary outline-none text-center font-bold tracking-[0.5em] text-xl shadow-inner" placeholder="•••••••">
                </div>
            </div>
            
            <button onclick="checkAuth()" class="w-full bg-secondary text-white py-4 rounded-2xl font-black text-xl shadow-xl hover:brightness-110 active:scale-95 transition-all">解鎖系統</button>
        </div>
    </div>

    <div class="editor-container mt-10 mb-10 w-full max-w-[720px] bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-primary p-5 text-white flex justify-between items-center cursor-pointer" onclick="toggleEditor()">
            <h2 class="font-bold flex items-center gap-2 text-sm italic tracking-widest uppercase">📚 全自動多頁連載引擎</h2>
            <span class="text-[10px] px-3 py-1 bg-white/10 rounded-full border border-white/20 uppercase tracking-widest">Collapse</span>
        </div>
        
        <div id="editor-body" class="p-8 space-y-6">
            <div class="bg-primary/[0.03] p-6 rounded-[2rem] border border-primary/10">
                <label class="text-[10px] font-bold text-primary/40 uppercase tracking-[0.3em] mb-3 block">貼上長文，AI 自動幫你切分成多頁 IG 貼文</label>
                <textarea id="ai-raw-input" rows="3" class="w-full p-4 border-2 border-dashed border-primary/20 rounded-2xl outline-none focus:border-secondary text-sm bg-white" placeholder="貼上棒球新聞、訓練科學文獻或體能課表..."></textarea>
                <button id="ai-btn" onclick="callRealAI()" class="w-full mt-3 bg-primary text-white py-4 rounded-xl font-bold text-xs hover:bg-primary/90 transition-all shadow-lg flex items-center justify-center gap-2">
                    <span id="ai-btn-text">🪄 啟動 AI 智能分頁萃取</span>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-gray-50/50 p-4 rounded-2xl border border-gray-100 relative overflow-hidden">
                    <div id="ai-mode-badge" class="absolute top-0 right-0 bg-secondary text-white text-[9px] px-2 py-1 font-black tracking-widest hidden">AI 接管中</div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Slide / Total</label>
                    <div class="flex items-center gap-3">
                        <input id="in-curr-page" type="number" oninput="sync()" class="w-12 border-b-2 border-primary/20 bg-transparent text-center font-black text-primary text-xl" value="1">
                        <span class="text-gray-300 font-bold">/</span>
                        <input id="in-total-page" type="number" oninput="sync()" class="w-12 border-b-2 border-gray-200 bg-transparent text-center font-black text-gray-400 text-xl" value="1">
                    </div>
                </div>
                <div class="bg-gray-50/50 p-4 rounded-2xl border border-gray-100">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Series Volume</label>
                    <div class="flex items-center gap-2">
                        <span class="text-secondary font-black text-sm uppercase">VOL.</span>
                        <input id="in-no-num" type="number" oninput="sync()" class="w-full border-b-2 border-secondary/20 bg-transparent text-center font-black text-secondary text-xl" value="1">
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input id="in-tag" type="text" oninput="sync()" class="p-4 border border-gray-100 rounded-2xl text-xs font-black text-primary uppercase tracking-widest bg-gray-50/30" placeholder="分類 (如: BIOMECHANICS)">
                    <input id="in-ig" type="text" oninput="sync()" class="p-4 border border-gray-100 rounded-2xl text-xs text-secondary font-black tracking-widest bg-gray-50/30" value="@JoeYou501">
                </div>
                <input id="in-title" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl focus:border-secondary font-serif font-black text-base" placeholder="標題">
                <input id="in-p1" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl text-xs" placeholder="重點1|內容描述">
                <input id="in-p2" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl text-xs" placeholder="重點2|內容描述">
                <input id="in-p3" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl text-xs" placeholder="重點3|內容描述">
                <input id="in-quote" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl text-xs italic font-serif" placeholder="結尾金句">
            </div>

            <div class="flex gap-4">
                <button onclick="downloadImage()" class="flex-1 bg-gray-100 text-gray-500 py-5 rounded-3xl font-black text-xs uppercase tracking-[0.2em] hover:bg-gray-200 transition-all">儲存單頁</button>
                <button onclick="nextPage()" class="flex-[2] bg-secondary text-white py-5 rounded-3xl font-black text-xl shadow-2xl shadow-secondary/30 active:scale-95 transition-all">下一頁並下載</button>
            </div>
        </div>
    </div>

    <div id="poster-card" class="p-16 flex flex-col border-t-[16px] border-primary">
        <header class="mb-14 relative z-10">
            <div class="flex items-center justify-between mb-10">
                <div class="flex items-center gap-4">
                    <div class="h-5 w-1.5 bg-secondary"></div>
                    <span id="out-tag" class="font-sans text-primary tracking-[0.4em] text-[13px] font-black uppercase">S&C SCIENCE</span>
                </div>
                <span id="out-no" class="font-sans text-secondary/40 text-[12px] font-black tracking-widest uppercase italic">VOL. 01</span>
            </div>
            <h1 id="out-title" class="font-serif text-primary text-[46px] font-black leading-[1.25] mb-8 tracking-tight">等待內容...</h1>
            <div class="w-20 h-1.5 bg-secondary/30 mb-8"></div>
        </header>
        
        <main class="flex-grow space-y-12 relative z-10">
            <div id="row1" class="point-row"> <div class="number-box shadow-lg shadow-primary/10">01</div> <div> <h3 id="out-p1t" class="font-serif text-[24px] font-black text-primary mb-2"></h3> <p id="out-p1c" class="font-sans text-primary/80 text-[18px] leading-relaxed max-w-[480px]"></p> </div> </div>
            <div id="row2" class="point-row"> <div class="number-box shadow-lg shadow-primary/10">02</div> <div> <h3 id="out-p2t" class="font-serif text-[24px] font-black text-primary mb-2"></h3> <p id="out-p2c" class="font-sans text-primary/80 text-[18px] leading-relaxed max-w-[480px]"></p> </div> </div>
            <div id="row3" class="point-row"> <div class="number-box shadow-lg shadow-primary/10">03</div> <div> <h3 id="out-p3t" class="font-serif text-[24px] font-black text-primary mb-2"></h3> <p id="out-p3c" class="font-sans text-primary/80 text-[18px] leading-relaxed max-w-[480px]"></p> </div> </div>
        </main>
        
        <footer class="mt-16 flex justify-between items-end relative z-10">
            <div class="flex flex-col gap-3">
                <p id="out-quote" class="font-serif text-primary/60 text-[17px] italic mb-6 max-w-[420px] leading-relaxed"></p>
                <div class="flex items-center gap-2">
                    <div id="page-indicator" class="bg-primary text-bglight text-[11px] font-black px-3 py-1 tracking-tighter italic">1 / 1</div>
                    <div class="h-[1px] w-6 bg-primary/10"></div>
                </div>
            </div>
            <div class="flex items-center gap-3 border-b-2 border-secondary/20 pb-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c59d5f" stroke-width="2.5"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line></svg>
                <span id="out-ig" class="font-serif text-secondary text-lg font-black tracking-widest uppercase italic">JoeYou501</span>
            </div>
        </footer>
    </div>

    <script>
        // --- 狀態變數 ---
        let aiSlidesData = [];
        let currentAiIndex = 0;

        // --- 系統初始化 ---
        window.onload = function() {
            // 還原個人設定
            document.getElementById('in-no-num').value = localStorage.getItem('sc_last_no') || 1;
            document.getElementById('in-ig').value = localStorage.getItem('sc_last_ig') || "@JoeYou501";
            document.getElementById('api-key-input').value = localStorage.getItem('sc_api_key') || "";
            
            const savedModel = localStorage.getItem('sc_curated_model');
            if (savedModel) document.getElementById('curated-model-select').value = savedModel;
        };

        // --- 安全解鎖與設定儲存 ---
        function checkAuth() {
            const pwdInput = document.getElementById('auth-input');
            const keyInput = document.getElementById('api-key-input');
            
            if (!pwdInput || !keyInput) return;
            
            if (pwdInput.value.trim() === ACCESS_PASSWORD) {
                const keyVal = keyInput.value.trim();
                if (!keyVal.startsWith("AIza")) return alert("請輸入有效的 Gemini API Key！");
                
                // 儲存至本機
                localStorage.setItem('sc_api_key', keyVal);
                saveModelPref();
                
                // 移除遮罩
                const overlay = document.getElementById('auth-overlay');
                if (overlay) overlay.remove(); 
                sync();
            } else {
                alert("解鎖密碼錯誤");
                pwdInput.value = "";
            }
        }

        function saveModelPref() {
            localStorage.setItem('sc_curated_model', document.getElementById('curated-model-select').value);
        }

        function toggleEditor() {
            document.getElementById('editor-body').classList.toggle('hidden');
        }

        // --- AI 引擎核心呼叫 ---
        async function callRealAI() {
            const raw = document.getElementById('ai-raw-input').value;
            if (!raw) return alert("請貼上文字內容");
            
            const savedApiKey = localStorage.getItem('sc_api_key');
            const selectedModel = document.getElementById('curated-model-select').value;
            if (!savedApiKey) return alert("找不到 API Key，請重新整理頁面。");
            
            const btn = document.getElementById('ai-btn');
            const btnText = document.getElementById('ai-btn-text');
            btn.disabled = true; 
            btnText.innerText = `🚀 正在呼叫 ${selectedModel}...`;

            const prompt = `請以專業肌力與體能教練的角度，將以下長篇文字拆解成一組「IG 多頁滑動貼文」。
            請以 JSON 格式回應，不要包含 Markdown 標記。
            結構必須精準相符：
            {"slides": [{"title": "標題", "points": ["重點標題|描述內容", "重點標題|描述內容"], "quote": "金句"}]}
            輸入長文：\n${raw}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${savedApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(`伺服器錯誤 [${data.error?.code || response.status}]: ${data.error?.message || '未知錯誤'}`);
                
                const rawText = data.candidates[0].content.parts[0].text;
                const result = JSON.parse(rawText.match(/\{[\s\S]*\}/)[0]); // 確保只擷取 JSON 區塊
                
                // 成功後處理資料
                aiSlidesData = result.slides;
                currentAiIndex = 0;
                document.getElementById('in-total-page').value = aiSlidesData.length;
                document.getElementById('ai-mode-badge').classList.remove('hidden');

                loadSlideToUI(currentAiIndex);
                alert(`✨ 成功！為您拆分成了 ${aiSlidesData.length} 頁。`);

            } catch (err) {
                alert(`❌ 解析失敗：\n\n${err.message}`);
            } finally {
                btn.disabled = false; 
                btnText.innerText = "🪄 啟動 AI 智能分頁萃取";
            }
        }

        // --- 畫面同步與 UI 更新 ---
        function loadSlideToUI(index) {
            const slide = aiSlidesData[index];
            if (!slide) return;
            
            document.getElementById('in-curr-page').value = index + 1;
            document.getElementById('in-title').value = slide.title || "";
            document.getElementById('in-p1').value = slide.points?.[0] || "";
            document.getElementById('in-p2').value = slide.points?.[1] || "";
            document.getElementById('in-p3').value = slide.points?.[2] || "";
            document.getElementById('in-quote').value = slide.quote || "";
            sync();
        }

        function sync() {
            // 更新通用欄位
            document.getElementById('page-indicator').innerText = `${document.getElementById('in-curr-page').value} / ${document.getElementById('in-total-page').value}`;
            document.getElementById('out-no').innerText = `VOL. ${document.getElementById('in-no-num').value.toString().padStart(2, '0')}`;
            document.getElementById('out-tag').innerText = document.getElementById('in-tag').value || "S&C SCIENCE";
            document.getElementById('out-title').innerHTML = document.getElementById('in-title').value || "等待內容中";
            
            const igAccount = document.getElementById('in-ig').value;
            document.getElementById('out-ig').innerText = igAccount;
            localStorage.setItem('sc_last_ig', igAccount); // 即時記憶 IG 帳號

            const quoteText = document.getElementById('in-quote').value;
            document.getElementById('out-quote').innerText = quoteText ? `「${quoteText}」` : "";
            
            // 精簡的重點列更新邏輯
            for (let i = 1; i <= 3; i++) {
                const val = document.getElementById('in-p' + i).value;
                const row = document.getElementById(`row${i}`);
                
                if (val && val.includes('|')) {
                    const [t, c] = val.split('|');
                    document.getElementById(`out-p${i}t`).innerText = t;
                    document.getElementById(`out-p${i}c`).innerText = c;
                    row.style.display = "flex";
                } else { 
                    row.style.display = "none";
                }
            }
        }

        // --- 匯出與導覽 ---
        async function downloadImage() {
            const node = document.getElementById('poster-card');
            const vol = document.getElementById('in-no-num').value;
            const page = document.getElementById('in-curr-page').value;
            
            localStorage.setItem('sc_last_no', vol); // 記憶期數

            try {
                await document.fonts.ready;
                const dataUrl = await htmlToImage.toPng(node, { pixelRatio: 3, backgroundColor: '#fdfbf7' });
                const link = document.createElement('a');
                link.download = `Slide-Vol${vol}-P${page}.png`;
                link.href = dataUrl; 
                link.click();
                
                await new Promise(r => setTimeout(r, 500)); // 緩衝確保下載觸發
            } catch (err) { 
                alert('圖片產生出錯，請確認瀏覽器支援 html2canvas/html-to-image。'); 
            }
        }

        async function nextPage() {
            await downloadImage(); 
            
            if (aiSlidesData.length > 0) {
                // AI 自動連載模式
                if (currentAiIndex < aiSlidesData.length - 1) {
                    currentAiIndex++;
                    loadSlideToUI(currentAiIndex);
                } else {
                    alert("🎉 這組貼文已經全部下載完成囉！");
                    document.getElementById('ai-mode-badge').classList.add('hidden');
                    aiSlidesData = []; // 清空狀態
                }
            } else {
                // 手動模式
                let curr = parseInt(document.getElementById('in-curr-page').value);
                let total = parseInt(document.getElementById('in-total-page').value);
                if (curr < total) { 
                    document.getElementById('in-curr-page').value = curr + 1; 
                    sync(); 
                }
            }
        }
    </script>
</body>
</html>
